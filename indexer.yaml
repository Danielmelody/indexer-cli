  file: ~/.indexer-cli/indexer.log
  max_size_mb: 10
  max_backups: 5
retry:
  enabled: true
  max_attempts: 3
  backoff_factor: 2
  max_wait_seconds: 60
output:
  format: text
  color: true
  verbose: false
